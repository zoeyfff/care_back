# 应用服务 WEB 访问端口
server.port=8080

spring.datasource.url=jdbc:mysql://localhost:3306/managesystem?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=040617
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.global-config.db-config.id-type=auto

# JSON 序列化：全局 snake_case（与前端 Mock/表字段对齐）
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=GMT+8

app.jwt.secret=manage-system-secret-key-change-in-prod
app.jwt.expire-seconds=86400
app.file.upload-dir=uploads
# 床位入住率分母（无独立床位总表时的估算配置）
app.stats.total-beds=200

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB

# 第三方接口示例：邮件服务（请替换为真实 SMTP 配置）
spring.mail.host=smtp.qq.com
spring.mail.port=465
spring.mail.username=your_email@qq.com
spring.mail.password=your_auth_code
spring.mail.protocol=smtps
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true